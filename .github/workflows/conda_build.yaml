name: Conda Package CI/CD

on:
  push:
    branches:
      - main
    tags:
      - 'release-*'
  pull_request:
    branches:
      - main

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: latest

      - name: Set staging channel for pre-release builds
        if: startsWith(github.ref, 'refs/tags/release-')
        run: |
          VERSION="${GITHUB_REF#refs/tags/release-}"
          if [[ "$VERSION" =~ (rc|a|b)[0-9] ]]; then
            echo "EXTRA_CHANNEL=ga-fdp/label/staging" >> $GITHUB_ENV
          fi

      - name: Build Conda package
        env:
          EXTRA_CHANNEL: ${{ env.EXTRA_CHANNEL }}
        run: |
          pixi global install rattler-build
          ./build_package.sh ${HOME}/outdir

      - name: Upload to Anaconda
        if: startsWith(github.ref, 'refs/tags/release-')
        run: |
          VERSION="${GITHUB_REF#refs/tags/release-}"
          if [[ "$VERSION" =~ (rc|a|b)[0-9] ]]; then
            LABEL="staging"
          else
            LABEL="main"
          fi
          rattler-build upload anaconda \
            --owner ga-fdp \
            --channel "$LABEL" \
            --api-key ${{ secrets.ANACONDA_API_TOKEN }} \
            --force \
            ${HOME}/outdir/linux-64/*.conda

      - name: Deploy Docs
        if: startsWith(github.ref, 'refs/tags/release-') && !contains(github.ref, 'rc') && !contains(github.ref, 'a') && !contains(github.ref, 'b')
        run: |
          TAG=${GITHUB_REF#refs/tags/release-}
          MAJOR=$(echo $TAG | cut -d. -f1)
          MINOR=$(echo $TAG | cut -d. -f2)

          git config --global user.name "Docs Deploy"
          git config --global user.email "toksearch-docs@fusion.gat.com"
          pixi run -e docs mike deploy --push --update-aliases ${MAJOR}.${MINOR}.X latest
